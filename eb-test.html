<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>e-Boekhouden XML test</title></head>
<body style="font-family:sans-serif;padding:2rem;max-width:900px;">
<h2>e-Boekhouden XML test</h2>
<div style="display:grid;gap:8px;margin-bottom:1rem;">
  <input id="user" placeholder="Gebruikersnaam" style="padding:8px;border:1px solid #ccc;border-radius:6px;">
  <input id="code1" type="password" placeholder="Beveiligingscode 1" style="padding:8px;border:1px solid #ccc;border-radius:6px;">
  <input id="code2" type="password" placeholder="Beveiligingscode 2" style="padding:8px;border:1px solid #ccc;border-radius:6px;">
  <button onclick="testRaw()" style="padding:10px;background:#0071e3;color:#fff;border:none;border-radius:20px;cursor:pointer;">Ruwe XML ophalen</button>
</div>
<pre id="output" style="background:#f5f5f7;padding:1rem;border-radius:8px;overflow:auto;font-size:11px;white-space:pre-wrap;word-break:break-all;max-height:600px;"></pre>
<script>
async function testRaw() {
  const user = document.getElementById('user').value.trim();
  const code1 = document.getElementById('code1').value.trim();
  const code2 = document.getElementById('code2').value.trim();
  const out = document.getElementById('output');
  out.textContent = 'Bezig...';
  try {
    const res = await fetch('https://major9-api.kjc-sariwating.workers.dev/eboekhouden/rawxml', {
      headers: { 'X-EB-User': user, 'X-EB-Token': code1, 'X-EB-Token2': code2 }
    });
    const data = await res.json();
    // Toon alleen eerste 3000 tekens van XML
    out.textContent = JSON.stringify({ sessionID: data.sessionID, xml_preview: (data.xml || '').slice(0, 3000) }, null, 2);
  } catch(e) {
    out.textContent = 'Fout: ' + e.message;
  }
}
</script>
</body>
</html>
