<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>e-Boekhouden test</title></head>
<body style="font-family:sans-serif;padding:2rem;max-width:800px;">
<h2>e-Boekhouden XML test</h2>
<div style="display:grid;gap:8px;margin-bottom:1rem;">
  <input id="user" placeholder="Gebruikersnaam" style="padding:8px;border:1px solid #ccc;border-radius:6px;">
  <input id="code1" type="password" placeholder="Beveiligingscode 1" style="padding:8px;border:1px solid #ccc;border-radius:6px;">
  <input id="code2" type="password" placeholder="Beveiligingscode 2" style="padding:8px;border:1px solid #ccc;border-radius:6px;">
  <button onclick="test()" style="padding:10px;background:#0071e3;color:#fff;border:none;border-radius:20px;cursor:pointer;">Testen</button>
</div>
<pre id="output" style="background:#f5f5f7;padding:1rem;border-radius:8px;overflow:auto;font-size:12px;white-space:pre-wrap;"></pre>

<script>
async function test() {
  const user = document.getElementById('user').value.trim();
  const code1 = document.getElementById('code1').value.trim();
  const code2 = document.getElementById('code2').value.trim();
  const out = document.getElementById('output');
  out.textContent = 'Bezig...';

  try {
    const res = await fetch('https://major9-api.kjc-sariwating.workers.dev/eboekhouden/mutaties', {
      headers: { 'X-EB-User': user, 'X-EB-Token': code1, 'X-EB-Token2': code2 }
    });
    const data = await res.json();
    out.textContent = JSON.stringify(data, null, 2);
  } catch(e) {
    out.textContent = 'Fout: ' + e.message;
  }
}
</script>
</body>
</html>
